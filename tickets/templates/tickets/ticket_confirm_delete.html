{% extends 'base.html' %}

{% block header_title %}Delete Ticket #{{ ticket.id|stringformat:"04d" }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6 mt-10">
    <div class="bg-white rounded-3xl p-8 shadow-xl shadow-slate-200/50 border border-slate-200/60 relative overflow-hidden">
        <div class="absolute top-0 right-0 -mr-8 -mt-8 opacity-5">
            <i class="fas fa-trash-alt text-9xl text-rose-500"></i>
        </div>
        
        <div class="relative z-10 text-center">
            <div class="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-exclamation-triangle text-rose-500 text-2xl"></i>
            </div>
            
            <h2 class="text-2xl font-black text-slate-800 tracking-tight mb-2">Delete this Ticket?</h2>
            <p class="text-slate-500 text-sm font-medium mb-8">
                Are you sure you want to permanently delete <strong>"{{ ticket.title }}"</strong>? This action cannot be undone.
            </p>
            
            <form method="post" class="flex justify-center space-x-4">
                {% csrf_token %}
                <a href="{% url 'ticket_detail' ticket.id %}" class="px-6 py-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-rose-900/20 transition-all flex items-center">
                    <i class="fas fa-trash-alt mr-2"></i> Yes, Delete Ticket
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
